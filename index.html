<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auld Lang Syne</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: url('cover.jpg') center/cover no-repeat fixed;
  color: #f5f5f5;
}

/* Темный полупрозрачный слой для читаемости текста */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.55);
  z-index: -1;
}

header {
  text-align: center;
  padding: 280px 20px 0 20px;
  background: transparent;
}

/* Адаптация для разных экранов */
@media (max-width: 1200px) {
  header {
    padding: 200px 20px 0 20px;
  }
}

@media (max-width: 992px) {
  header {
    padding: 150px 20px 0 20px;
  }
}

@media (max-width: 768px) {
  header {
    padding: 120px 20px 0 20px;
  }
}

@media (max-width: 480px) {
  header {
    padding: 100px 20px 0 20px;
  }
}
header p {
  font-size: 18px;
  opacity: 0.85;
}

.section {
  padding: 0 20px 50px 20px;
  max-width: 900px;
  margin: auto;
}

iframe {
  width: 100%;
  height: 315px;
  border: none;
  border-radius: 10px;
}

audio {
  width: 100%;
}

footer {
  text-align: center;
  padding: 30px;
  opacity: 0.6;
}
</style>
</head>
<body>

<header>
  <h1>Auld Lang Syne</h1>
  <p>Андрей Волков • музыка для друзей</p>
</header>

<div class="section">
  <h2>🎧 Музыка</h2>
  <audio controls>
    <source src="Starajz Druzhba 12.03.2026 (6-39) (R.Burns).mp3" type="audio/mpeg">
  </audio>
  <iframe src="https://www.youtube.com/embed/6rTKeTF9_8g"></iframe>
</div>

<div class="section">
  <h2>🎬 Видео</h2>
  <iframe src="https://www.youtube.com/embed/eHLzjaWViEA"></iframe>
</div>

<footer>
  © Андрей Волков
</footer>

</body>
</html>
