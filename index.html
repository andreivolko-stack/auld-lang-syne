<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auld Lang Syne</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(to bottom, #0d0d0d, #1a0f0a);
  color: #f5f5f5;
}
header {
  text-align: center;
  padding: 120px 20px;
  background: url('cover.jpg') center/cover no-repeat;
}
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
  margin: 0;
}
header p {
  font-size: 18px;
  opacity: 0.85;
}
.section {
  padding: 50px 20px;
  max-width: 900px;
  margin: auto;
}
iframe {
  width: 100%;
  height: 315px;
  border: none;
  border-radius: 10px;
}
audio {
  width: 100%;
}
footer {
  text-align: center;
  padding: 30px;
  opacity: 0.6;

</style>
</head>
<body>

<header>
  <h1>Auld Lang Syne</h1>
  <p>Андрей Волков • музыка для друзей</p>
</header>

<div class="section">
  <h2>🎧 Музыка</h2>
  <audio controls>
    <source src="Starajz Druzhba 12.03.2026 (6-39) (R.Burns).mp3" type="audio/mpeg">
  </audio>
  <iframe src="https://www.youtube.com/embed/6rTKeTF9_8g"></iframe>
</div>

<div class="section">
  <h2>🎬 Видео</h2>
